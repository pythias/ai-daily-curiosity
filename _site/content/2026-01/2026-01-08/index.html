<p>章鱼是地球上最奇特的生物之一。它们拥有 <strong>三颗心脏</strong>、<strong>蓝色血液</strong>，以及能够独立于大脑运作的触手——每条触手都有自己的「小脑子」。</p>
<p>章鱼的两颗心脏负责将血液泵向鳃部进行氧气交换，第三颗心脏则负责将氧合血液泵往全身。当章鱼在水中游泳时，第三颗心脏会停止跳动，这也是为什么它们更喜欢爬行而非游泳。</p>
<p>至于蓝色的血液，是因为章鱼使用 <strong>血蓝蛋白</strong>（hemocyanin）来运输氧气，而不是哺乳动物使用的血红蛋白。血蓝蛋白在携带氧气时呈现蓝色。科学家认为，这种物质在低温、低氧的深海环境中比血红蛋白更高效。</p>
