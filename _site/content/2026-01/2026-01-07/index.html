<p>今天我们理解的「床」是睡觉的家具，但在古代中国，「床」的概念完全不同。在唐宋时期，<strong>床</strong> 主要指的是一种 <strong>坐具</strong>，类似于今天的沙发或罗汉床。</p>
<p>杜甫的名句「床前明月光」引发过无数讨论。其实这里的「床」指的是厅堂中摆放的坐具，而非卧具——诗人应该是坐在院子里赏月，而非躺在床上。</p>
<p>古代人睡觉用的是 <strong>「榻」</strong> 或 <strong>「衾」</strong>（被子）。「榻」通常狭窄，只能躺一人，所以我们现在还有「下榻」这个词语，意思是住宿、落脚。这个汉字的语义变迁，正好反映了中国人起居方式的历史演变。</p>
