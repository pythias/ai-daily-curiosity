<p>鸭嘴兽大概是地球上最奇怪的哺乳动物：它有鸭子的嘴、海狸的尾巴、水獭的脚，而且 <strong>它会下蛋</strong>。当 1799 年英国科学家第一次看到鸭嘴兽标本时，他们以为是有人在恶作剧——把鸭子嘴缝在了河狸身上。</p>
<p>从进化角度看，鸭嘴兽属于 <strong>单孔目</strong>（Monotremes），是哺乳动物中最原始的一支。它们保留了祖先的卵生特征，同时又具备哺乳动物的乳汁分泌——尽管它们没有乳头，乳汁直接从腹部皮肤渗出。</p>
<p>更有趣的是，鸭嘴兽还有 <strong>电感应能力</strong>——它们在水底觅食时，靠感知猎物的电场来定位。这是哺乳动物中极其罕见的技能，鲨鱼和某些鱼类才具备。</p>
