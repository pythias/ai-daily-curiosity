<p>「清华」这个名字背后藏着一个有趣的语言学故事。当清华大学在 1911 年成立时，它的英文名被定为 <strong>Tsinghua</strong>，而非直接用拼音的 Qinghua。</p>
<p>这是因为在清末民初时期，威妥玛拼音（Wade-Giles system）是当时西方世界通用的中文罗马化方案。在这套系统中，「清」被拼写为 <strong>Ts'ing</strong>（用 apostrophe 区分送气音），后来逐渐演变成 <strong>Tsing</strong>。</p>
<p>有趣的是，<strong>Tsinghua</strong> 这个拼写在英语世界已经约定俗成，以至于即使汉语拼音早已成为国际标准，清华大学至今仍保留了这个「老式「英文名——它已经成为了一个文化符号，见证着中国高等教育与西方交流的百年历程。</p>
