<p>关于莫扎特，我们听过太多「天才」故事——他五岁作曲、能在闭眼情况下演奏复杂作品。但历史学家发现，现实中的莫扎特其实是一位 <strong>并不出色的钢琴演奏家</strong>。</p>
<p>莫扎特本人曾多次抱怨钢琴演奏让他感到焦虑和痛苦。他的父亲利奥波德在信中提到，莫扎特的钢琴技术「从不是最好的」。与他同时代的钢琴家如克莱门蒂（Clementi）和图尔特（Stewart）都曾在技巧上超越他。</p>
<p>莫扎特的伟大之处在于他的 <strong>作曲能力</strong>——他能将旋律、和声与结构完美融合，创造出令人心碎的音乐。但将这样的大脑称为「钢琴演奏天才」，其实是对他真正天赋的一种误解。</p>
