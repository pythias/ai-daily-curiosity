<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每天一个小好奇</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Playfair+Display:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #FAFAF8;
      --text-primary: #1A1A1A;
      --text-secondary: #6B6B6B;
      --accent: #E85D4C;
      --card-bg: #FFFFFF;
      --border: #EEEEEE;
    }

    body {
      font-family: 'Noto Serif SC', serif;
      background-color: var(--bg);
      color: var(--text-primary);
      line-height: 1.9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px;
    }

    .logo {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 3px;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-top: 48px;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 600ms ease-out forwards;
    }

    .container {
      max-width: 720px;
      width: 100%;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.04), 0 1px 4px rgba(0, 0, 0, 0.02);
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 600ms ease-out 100ms forwards;
      transition: transform 400ms ease, box-shadow 400ms ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.03);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      display: block;
      background: linear-gradient(135deg, #f5f5f4 25%, #e8e8e6 50%, #f5f5f4 75%);
      background-size: 200% 200%;
      animation: shimmer 2s infinite;
    }

    .card-img.loaded {
      animation: none;
      background: none;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .content {
      padding: 48px;
    }

    @media (max-width: 600px) {
      .content {
        padding: 28px 24px;
      }
    }

    .date {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1.5px;
      color: var(--text-secondary);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 600ms ease-out 200ms forwards;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 600ms ease-out 300ms forwards;
    }

    .divider-line {
      width: 48px;
      height: 1px;
      background: var(--border);
    }

    .divider-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      color: var(--text-primary);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 600ms ease-out 300ms forwards;
    }

    @media (max-width: 600px) {
      .title {
        font-size: 22px;
      }
    }

    .subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      text-align: center;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 600ms ease-out 350ms forwards;
    }

    .body-text {
      font-size: 17px;
      color: var(--text-primary);
      text-align: justify;
      opacity: 0;
      animation: fadeUp 600ms ease-out 400ms forwards;
    }

    .body-text p {
      margin-bottom: 20px;
    }

    .body-text p:last-child {
      margin-bottom: 0;
    }

    .body-text strong, .body-text b {
      color: var(--accent);
      font-weight: 600;
    }

    .footer {
      margin-top: 48px;
      margin-bottom: 64px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 600ms ease-out 500ms forwards;
    }

    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      margin-bottom: 20px;
    }

    .nav-btn {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border);
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 200ms ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }

    .nav-btn:hover:not(:disabled) {
      background: var(--text-primary);
      color: var(--bg);
      border-color: var(--text-primary);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .nav-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    .shuffle-btn {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border);
      padding: 14px 32px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 200ms ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
    }

    .shuffle-btn:hover {
      background: var(--text-primary);
      color: var(--bg);
      border-color: var(--text-primary);
    }

    .shuffle-btn:active {
      transform: scale(0.97);
    }

    .today-badge {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1px;
      color: white;
      background: var(--accent);
      padding: 4px 8px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-out {
      animation: fadeOut 300ms ease-out forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: translateY(-10px);
      }
    }

    .credit {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: #C0C0C0;
      margin-top: 24px;
      letter-spacing: 0.5px;
    }

    .loading {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      text-align: center;
      padding: 80px 40px;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="logo">好奇</div>

  <div class="container">
    <div class="card">
      <img id="card-img" class="card-img" src="" alt="今日好奇">
      <div class="content">
        <div id="date" class="date"></div>
        <div class="divider">
          <span class="divider-line"></span>
          <span class="divider-dot"></span>
          <span class="divider-line"></span>
        </div>
        <h1 id="title" class="title"></h1>
        <div id="subtitle" class="subtitle"></div>
        <div id="body-text" class="body-text"></div>
      </div>
    </div>

    <div class="footer">
      <div class="nav">
        <a id="prev-btn" class="nav-btn" href="#" onclick="goToPrev(); return false;">
          ← 前一天
        </a>
        <a id="next-btn" class="nav-btn" href="#" onclick="goToNext(); return false;">
          后一天 →
        </a>
      </div>
      <button class="shuffle-btn" onclick="shuffleCuriosity()">
        <span>↻</span> 换一换
      </button>
      <div class="credit">每日更新 · 让知识成为一种习惯</div>
    </div>
  </div>

  <script>
    const REPO = 'pythias/ai-daily-curiosity';
    const BRANCH = 'main';
    const CONTENT_BASE = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/content`;

    let curiositiesDB = [];
    let currentIndex = 0;
    let isAnimating = false;
    let loadingState = 'loading'; // loading, ready, error

    function formatDate(dateStr) {
      const [year, month, day] = dateStr.split('-');
      const d = new Date(year, month - 1, day);
      const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      const weekday = weekdays[d.getDay()];
      return `${year}年${parseInt(month)}月${parseInt(day)}日 ${weekday}`;
    }

    function isToday(dateStr) {
      const today = new Date();
      const todayStr = today.toISOString().split('T')[0];
      return dateStr === todayStr;
    }

    function isFuture(dateStr) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const targetDate = new Date(dateStr);
      return targetDate > today;
    }

    function parseFrontmatter(content) {
      const match = content.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (!match) return null;
      
      const fm = {};
      match[1].split('\n').forEach(line => {
        const [key, ...rest] = line.split(':');
        if (key && rest.length) {
          fm[key.trim()] = rest.join(':').trim();
        }
      });
      
      return {
        ...fm,
        body: match[2].trim()
      };
    }

    function renderMarkdown(text) {
      // Simple markdown to HTML (handles **bold** and line breaks)
      return text
        .split('\n\n')
        .map(p => `<p>${p.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</p>`)
        .join('');
    }

    function showLoading() {
      const content = document.querySelector('.content');
      content.innerHTML = `
        <div class="loading">
          <div class="loading-spinner"></div>
          <div>正在加载今日好奇...</div>
        </div>
      `;
    }

    function showError(msg) {
      const content = document.querySelector('.content');
      content.innerHTML = `
        <div class="error">
          <p>加载失败: ${msg}</p>
        </div>
      `;
    }

    function renderCuriosity(index) {
      if (index < 0 || index >= curiositiesDB.length) return;

      const data = curiositiesDB[index];
      const today = isToday(data.date);
      const imgEl = document.getElementById('card-img');
      
      imgEl.onload = () => imgEl.classList.add('loaded');
      imgEl.src = data.image;
      imgEl.alt = data.title;

      document.getElementById('date').innerHTML = formatDate(data.date) + (today ? '<span class="today-badge">今日</span>' : '');
      document.getElementById('title').textContent = data.title;
      document.getElementById('subtitle').textContent = data.subtitle;
      document.getElementById('body-text').innerHTML = renderMarkdown(data.body);

      // Update navigation
      document.getElementById('prev-btn').style.visibility = index > 0 ? 'visible' : 'hidden';
      document.getElementById('next-btn').style.visibility = isFuture(data.date) ? 'hidden' : 'visible';
    }

    function goToPrev() {
      if (isAnimating || currentIndex <= 0) return;
      navigateTo(currentIndex - 1);
    }

    function goToNext() {
      if (isAnimating || currentIndex >= curiositiesDB.length - 1) return;
      const nextDate = curiositiesDB[currentIndex + 1].date;
      if (isFuture(nextDate)) return;
      navigateTo(currentIndex + 1);
    }

    function navigateTo(index) {
      if (isAnimating || index < 0 || index >= curiositiesDB.length) return;
      isAnimating = true;

      const elements = [
        document.querySelector('.card'),
        document.querySelector('.date'),
        document.querySelector('.title'),
        document.querySelector('.subtitle'),
        document.querySelector('.body-text'),
        document.querySelector('.nav'),
        document.querySelector('.footer')
      ];

      elements.forEach(el => el && el.classList.add('fade-out'));

      setTimeout(() => {
        currentIndex = index;
        const data = curiositiesDB[currentIndex];
        updateURL(data.date);
        renderCuriosity(currentIndex);

        elements.forEach(el => el && el.classList.remove('fade-out'));
        window.scrollTo({ top: 0, behavior: 'smooth' });

        setTimeout(() => {
          isAnimating = false;
        }, 100);
      }, 300);
    }

    function shuffleCuriosity() {
      if (isAnimating || curiositiesDB.length <= 1) return;
      isAnimating = true;

      const elements = [
        document.querySelector('.card'),
        document.querySelector('.date'),
        document.querySelector('.title'),
        document.querySelector('.subtitle'),
        document.querySelector('.body-text')
      ];

      elements.forEach(el => el && el.classList.add('fade-out'));

      setTimeout(() => {
        let newIndex;
        do {
          newIndex = Math.floor(Math.random() * curiositiesDB.length);
        } while (newIndex === currentIndex);

        currentIndex = newIndex;
        const data = curiositiesDB[currentIndex];
        updateURL(data.date);
        renderCuriosity(currentIndex);

        elements.forEach(el => el && el.classList.remove('fade-out'));
        window.scrollTo({ top: 0, behavior: 'smooth' });

        setTimeout(() => {
          isAnimating = false;
        }, 100);
      }, 300);
    }

    function getIndexFromDate(dateStr) {
      return curiositiesDB.findIndex(c => c.date === dateStr);
    }

    function getDateFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('date');
    }

    function updateURL(dateStr) {
      const url = new URL(window.location.href);
      url.searchParams.set('date', dateStr);
      window.history.replaceState({}, '', url);
    }

    async function fetchContentDir(yearMonth) {
      const url = `https://api.github.com/repos/${REPO}/contents/content/${yearMonth}`;
      const resp = await fetch(url, {
        headers: { 'Accept': 'application/vnd.github.v3+json' }
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.json();
    }

    async function fetchFile(path) {
      const url = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${path}`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.text();
    }

    async function loadAllCuriosities() {
      showLoading();
      
      try {
        // Fetch all content directories
        const yearMonths = ['2026-01', '2026-03', '2026-04']; // auto-detected months
        const allFiles = [];
        
        for (const ym of yearMonths) {
          try {
            const files = await fetchContentDir(ym);
            for (const f of files) {
              if (f.name.endsWith('.md')) {
                allFiles.push(`content/${ym}/${f.name}`);
              }
            }
          } catch (e) {
            console.warn(`Failed to fetch ${ym}:`, e);
          }
        }

        // Sort by date
        allFiles.sort();

        // Load each file
        for (const path of allFiles) {
          try {
            const content = await fetchFile(path);
            const parsed = parseFrontmatter(content);
            if (parsed && parsed.date && parsed.title) {
              curiositiesDB.push(parsed);
            }
          } catch (e) {
            console.warn(`Failed to load ${path}:`, e);
          }
        }

        if (curiositiesDB.length === 0) {
          throw new Error('No curiosities loaded');
        }

        // Sort by date
        curiositiesDB.sort((a, b) => a.date.localeCompare(b.date));

        // Initialize
        const urlDate = getDateFromURL();
        if (urlDate) {
          const idx = getIndexFromDate(urlDate);
          currentIndex = idx >= 0 ? idx : curiositiesDB.length - 1;
        } else {
          currentIndex = curiositiesDB.length - 1;
        }

        renderCuriosity(currentIndex);
      } catch (e) {
        showError(e.message);
        console.error('Failed to load curiosities:', e);
      }
    }

    loadAllCuriosities();
  </script>
</body>
</html>
