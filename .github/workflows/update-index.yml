name: Sync Index

on:
  push:
    branches:
      - main
    paths:
      - 'content/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/workflows/update-index.yml
          sparse-checkout-cone-mode: false

      - name: Detect months
        id: months
        run: |
          months=$(find content -type d -name '????-??' | sed 's|^content/||' | sort -u | tr '\n' ' ')
          echo "months=$months" >> $GITHUB_OUTPUT
          echo "Months found: $months"

      - name: Update index.html months list
        run: |
          # This workflow just triggers on content changes
          # The actual content is detected dynamically in the frontend
          echo "Content updated, GitHub Pages will rebuild"
